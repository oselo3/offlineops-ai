services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: offlineops-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__TELEMETRY_DISABLED=true

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: offlineops-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - ./datasets:/app/datasets
      - ./docs:/app/docs

volumes:
  qdrant_data:
